# sdr-telemetry-node broker — LAN-trusted (03_ARCHITECTURE §11)
listener 1883
allow_anonymous true

# retained state survives broker restarts (radio2/mode, */health, pass/next)
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# hygiene on a 1 GB node
max_queued_messages 1000
message_size_limit 65536
log_dest stdout
log_type warning
