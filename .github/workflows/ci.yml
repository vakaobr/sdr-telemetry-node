name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, radio2]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check . && ruff format --check .
      - name: Test
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install generators
        run: |
          pip install "datamodel-code-generator>=0.26"
          cd web && npm ci
      - name: Regenerate
        run: bash scripts/codegen.sh
      - name: Fail on drift
        run: |
          git diff --exit-code -- '**/generated_*.py' 'web/src/types/generated/' \
            || (echo '::error::generated code drifted from shared/schemas — run scripts/codegen.sh and commit' && exit 1)

  buildx:
    runs-on: ubuntu-latest
    needs: [python]
    strategy:
      matrix:
        image: [gateway, radio2]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build multi-arch (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: false
